# Serves the built frontend and proxies /api + /ws to the backend container —
# the same same-origin layout the vite dev proxy provides in development.
server {
  listen 80;
  root /usr/share/nginx/html;

  # REST — /api/foo → backend /foo (trailing slash strips the prefix).
  location /api/ {
    proxy_pass http://backend:8787/;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  # Websocket relay.
  location /ws {
    proxy_pass http://backend:8787/ws;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 3600s;
  }

  location / {
    try_files $uri /index.html;
  }
}
