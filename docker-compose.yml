# ARGUS one-liner (Theme 4.17):  docker compose up --build
# → http://localhost:8080  (nginx serves web/dist, proxies /api + /ws to the backend)
#
# Keys: copy .env.example → .env first (optional — keyless mode works, you
# just get fewer live layers). The backend reads /app/.env or plain env vars.
#
# NOTE: server/data ships with the preprocessed indexes (ports, anchorages,
# maritime boundaries) baked into the image; the runtime SQLite DB is
# therefore ephemeral. Mount a single file volume for sentinel.db if you
# want tracks/alerts to survive container recreation.
services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    environment:
      # nginx fronts the backend, so trust its X-Forwarded-For for rate limiting.
      TRUST_PROXY: "1"
    env_file:
      - path: .env
        required: false
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
